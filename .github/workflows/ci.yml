name: dream_path CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main
    tags: ['*']

jobs:
  build:
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: DreamWeave-MP/StroggForge/.github/workflows/libGlobalBuild.yml@v17
    secrets: inherit
    with:
      crate_names: '["dream_path"]'
      generate_benchmarks: true
      dependent_repo_names: '["DreamWeave-MP/dream_archive", "DreamWeave-MP/vfstool"]'
